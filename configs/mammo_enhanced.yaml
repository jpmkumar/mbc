# Enhanced mammography + multi-modality preprocessing
# Stage A: longer classical training, CLAHE, higher malignant weight
# Stage B: Benedetti VQC on frozen preprocessed features

project:
  name: "Modality-Level Generalized Hybrid Quantum Framework"
  seed: 42
  experiment_suffix: "_enhanced"

data:
  root: "data/processed"
  image_size: 224
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 2
  modalities:
    - mammo
    - ultrasound
    - thermo
  preprocessing:
    enabled: true
    mammo:
      grayscale: true
      clahe: true
      clip_limit: 2.0
      grid_size: 8
    ultrasound:
      grayscale: true
      clahe: true
      clip_limit: 2.0
      grid_size: 8
    thermo:
      grayscale: false
      clahe: false

model:
  encoder: "efficientnet_b0"
  encoder_dim: 1280
  projection_dim: 2048
  transformer:
    num_layers: 2
    num_heads: 4
    dim_feedforward: 512
    dropout: 0.1
  compression_dims: [128, 32, 8]
  num_modality_tokens: 3
  num_classes: 2
  quantum:
    n_qubits: 8
    n_layers: 2
    entanglement: "linear"
    feature_norm: true
    full_readout: true

training:
  batch_size: 16
  stage_a_epochs: 30
  stage_b_epochs: 20
  stage_c_epochs: 5
  lr_classical: 1.0e-4
  lr_quantum: 5.0e-5
  lr_joint: 1.0e-5
  weight_decay: 1.0e-4
  quantum_weight_decay: 1.0e-3
  freeze_encoder_epochs: 5
  freeze_backbone_in_stage_b: true
  backbone_eval_in_stage_b: true
  cache_frozen_backbone_features: true
  classical_device: auto
  quantum_device: cpu
  val_interval: 1
  checkpoint_interval: 1
  selection_metric: balanced_accuracy
  use_class_weights: true
  malignant_weight_multiplier: 1.8
  eval_threshold: 0.5

paths:
  results: "results"
  figures: "figures"
  checkpoints: "results/checkpoints"
