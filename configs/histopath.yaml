# Histopathology (IDC patch) experiment configuration

project:
  name: "IDC Histopathology Patch Classification"
  seed: 42
  experiment_suffix: "_histopath"

data:
  root: "data/splits/histopath"
  archive_path: null
  image_size: 224
  num_workers: 4
  modalities:
    - histopath
  preprocessing:
    enabled: true
    histopath:
      grayscale: false
      clahe: false
  # Fuller augmentation lifts the PR curve (both precision & recall).
  # strong=true adds vertical flips, full 90-deg rotations, and
  # saturation/hue jitter to cover H&E stain variation.
  augmentation:
    strong: true
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05

model:
  encoder: "efficientnet_b0"
  encoder_dim: 1280
  projection_dim: 2048
  transformer:
    num_layers: 2
    num_heads: 4
    dim_feedforward: 512
    dropout: 0.1
  compression_dims: [128, 32, 8]
  num_modality_tokens: 1
  num_classes: 2
  quantum:
    n_qubits: 8
    n_layers: 2
    entanglement: "linear"
    # default.qubit+backprop vectorizes the batch (~7x faster than
    # lightning.qubit+adjoint at 8 qubits). Override for large-qubit runs.
    backend: "default.qubit"
    diff_method: "backprop"

training:
  batch_size: 64
  # channels_last speeds cuDNN conv kernels on GPU (result-neutral).
  channels_last: true
  stage_a_epochs: 25
  stage_b_epochs: 15
  stage_c_epochs: 3
  lr_classical: 1.0e-4
  lr_quantum: 1.0e-4
  lr_joint: 1.0e-5
  weight_decay: 1.0e-4
  freeze_encoder_epochs: 3
  freeze_backbone_in_stage_b: true
  cache_frozen_backbone_features: true
  classical_device: cpu
  quantum_device: cpu
  val_interval: 1
  checkpoint_interval: 1
  selection_metric: balanced_accuracy
  use_class_weights: true
  malignant_weight_multiplier: 1.0
  # loss: focal focuses training on hard/ambiguous patches (improves both
  # precision and recall under imbalance). Set loss: ce for weighted CE.
  loss: focal
  focal_gamma: 2.0
  eval_threshold: 0.5
  tune_threshold: true
  # Threshold policy options:
  #   f1           -> balances precision/recall equally
  #   fbeta        -> F-beta; beta>1 leans toward recall (see fbeta_beta)
  #   recall_target-> highest threshold reaching target_recall (max sensitivity)
  # fbeta with beta=1.5 keeps precision respectable while favoring recall.
  threshold_metric: fbeta
  fbeta_beta: 1.5
  target_recall: 0.90
  # Test-time augmentation: average predictions over flips/rotations.
  tta: true
  early_stopping_patience: 5
  grad_clip_norm: 1.0
  val_ratio: 0.1

experiments:
  seeds: [42]
  qubit_sweep: [8]

paths:
  results: "results/histopath"
  figures: "figures"
  checkpoints: "results/histopath/checkpoints"
